server {
    listen 80;
    server_name perfostand.com www.perfostand.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name perfostand.com www.perfostand.com;

    # SSL — выдаётся через: certbot --nginx -d perfostand.com -d www.perfostand.com
    ssl_certificate     /etc/letsencrypt/live/perfostand.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/perfostand.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/perfostand.com/frontend/dist;
    index index.html;

    # SPA — все маршруты ведут на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш для статических ассетов (js, css, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
}
